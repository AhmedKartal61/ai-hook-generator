<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hook Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0e16;
      --surface: #161929;
      --surface2: #1e2235;
      --surface3: #252a42;
      --border: #2a2f4a;
      --border-hover: #3d4468;
      --accent: #7c6af7;
      --accent-hover: #6a58e6;
      --accent-dim: rgba(124, 106, 247, 0.12);
      --gold: #f59e0b;
      --gold-dim: rgba(245, 158, 11, 0.1);
      --gold-border: rgba(245, 158, 11, 0.35);
      --text: #e4e6f0;
      --text-muted: #7c82a0;
      --text-dim: #4a5070;
      --success: #34d399;
      --error: #f87171;
      --radius: 14px;
      --radius-sm: 9px;
      --radius-xs: 6px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
      line-height: 1.6;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ─────────────────────────────── */
    header {
      text-align: center;
      margin-bottom: 2.75rem;
      position: relative;
    }

    .header-orb {
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 220px;
      background: radial-gradient(ellipse at center, rgba(124,106,247,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .header-content {
      position: relative;
      z-index: 1;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #7c6af7, #a78bfa);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 20px rgba(124,106,247,0.4);
    }

    header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* ── Cards ──────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.375rem 1.5rem;
      margin-bottom: 1rem;
    }

    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    /* ── API Key (collapsible) ───────────────── */
    .api-connected {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .connected-dot {
      width: 7px;
      height: 7px;
      background: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--success);
      flex-shrink: 0;
    }

    .connected-label {
      font-size: 0.8rem;
      color: var(--success);
      font-weight: 500;
    }

    .connected-masked {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: monospace;
      flex: 1;
    }

    .btn-text {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.25rem 0.5rem;
      border-radius: var(--radius-xs);
      transition: color 0.15s, background 0.15s;
    }

    .btn-text:hover {
      color: var(--accent);
      background: var(--accent-dim);
    }

    .api-expanded {
      display: none;
    }

    .api-expanded.visible {
      display: block;
    }

    /* ── Form ───────────────────────────────── */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.35rem;
    }

    input, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      padding: 0.6rem 0.875rem;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      resize: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      background: var(--surface3);
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-dim);
    }

    .field {
      margin-bottom: 0.875rem;
    }

    .field:last-child { margin-bottom: 0; }

    .api-key-row {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }

    .api-key-row .field {
      flex: 1;
      margin-bottom: 0;
    }

    .btn-icon {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.95rem;
      padding: 0.6rem 0.7rem;
      transition: border-color 0.15s, color 0.15s;
      line-height: 1;
    }

    .btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Platform Pills ─────────────────────── */
    .platform-pills {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.35rem 0.875rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .pill:hover {
      border-color: var(--border-hover);
      color: var(--text);
    }

    .pill.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Generate Button ────────────────────── */
    .btn-generate {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.875rem;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      letter-spacing: 0.01em;
      box-shadow: 0 4px 20px rgba(124,106,247,0.3);
      margin-bottom: 1rem;
    }

    .btn-generate:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    .btn-generate:active:not(:disabled) { transform: translateY(0); }
    .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; transform: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      display: none;
    }

    .btn-generate.loading .spinner { display: block; }
    .btn-generate.loading .btn-label { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error ──────────────────────────────── */
    .error-box {
      background: rgba(248, 113, 113, 0.08);
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: var(--radius-sm);
      color: var(--error);
      font-size: 0.85rem;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* ── Results ────────────────────────────── */
    #results {
      display: none;
      animation: fadeSlideUp 0.3s ease forwards;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 1.75rem 0 0.75rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-dim);
    }

    .btn-copy-all {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.3rem 0.65rem;
      transition: all 0.15s;
    }

    .btn-copy-all:hover {
      border-color: var(--gold-border);
      color: var(--gold);
    }

    .btn-copy-all.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* ── Hook Cards ─────────────────────────── */
    .hook-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.125rem 1.25rem;
      margin-bottom: 0.625rem;
      display: flex;
      gap: 0.875rem;
      align-items: flex-start;
      transition: border-color 0.15s;
    }

    .hook-card:hover { border-color: var(--border-hover); }

    .hook-card.top-pick {
      background: linear-gradient(135deg, var(--surface) 0%, rgba(245,158,11,0.04) 100%);
      border-color: var(--gold-border);
    }

    .hook-card.top-pick:hover { border-color: var(--gold); }

    .hook-badge {
      flex-shrink: 0;
      margin-top: 0.15rem;
    }

    .hook-number {
      background: var(--surface2);
      border-radius: var(--radius-xs);
      color: var(--text-dim);
      font-size: 0.7rem;
      font-weight: 700;
      min-width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hook-crown {
      width: 26px;
      height: 26px;
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
    }

    .hook-content { flex: 1; min-width: 0; }

    .hook-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .hook-type {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-dim);
    }

    .hook-card.top-pick .hook-type { color: var(--gold); opacity: 0.8; }

    .best-pick-tag {
      font-size: 0.62rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--gold);
      background: var(--gold-dim);
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      padding: 0.1rem 0.45rem;
    }

    .hook-text {
      color: var(--text);
      font-size: 0.925rem;
      line-height: 1.65;
    }

    .hook-why {
      margin-top: 0.6rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.55;
      border-left: 2px solid var(--gold-border);
      padding-left: 0.625rem;
    }

    .hook-actions {
      flex-shrink: 0;
      display: flex;
      align-items: flex-start;
      padding-top: 0.1rem;
    }

    .btn-copy {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.72rem;
      padding: 0.3rem 0.55rem;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-copy:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-copy.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* ── Footer ─────────────────────────────── */
    footer {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.75rem;
      margin-top: 3rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-orb"></div>
      <div class="header-content">
        <div class="logo">
          <div class="logo-icon">⚡</div>
          AI Hook Generator
        </div>
        <p>10 high-converting hooks, instantly. Powered by Claude.</p>
      </div>
    </header>

    <!-- API Key -->
    <div class="card" id="apiKeyCard">
      <!-- Collapsed state -->
      <div class="api-connected" id="apiConnected" style="display:none">
        <div class="connected-dot"></div>
        <span class="connected-label">Connected</span>
        <span class="connected-masked" id="apiMasked"></span>
        <button class="btn-text" id="editKeyBtn">Edit</button>
      </div>
      <!-- Expanded state -->
      <div class="api-expanded" id="apiExpanded">
        <div class="card-title">Anthropic API Key</div>
        <div class="api-key-row">
          <div class="field">
            <label for="apiKey">Stored locally — never sent anywhere except Anthropic</label>
            <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off" />
          </div>
          <button class="btn-icon" id="toggleKey" title="Show/hide">👁</button>
          <button class="btn-icon" id="clearKey" title="Clear">✕</button>
        </div>
      </div>
    </div>

    <!-- Platform -->
    <div class="card">
      <div class="card-title">Platform</div>
      <div class="platform-pills" id="platformPills">
        <button class="pill" data-platform="twitter">Twitter / X</button>
        <button class="pill" data-platform="linkedin">LinkedIn</button>
        <button class="pill" data-platform="instagram">Instagram</button>
        <button class="pill" data-platform="email">Email Subject</button>
        <button class="pill" data-platform="youtube">YouTube Title</button>
      </div>
    </div>

    <!-- Context -->
    <div class="card">
      <div class="card-title">Your Context</div>
      <div class="field">
        <label for="niche">Niche</label>
        <input type="text" id="niche" placeholder="e.g. personal finance, fitness, SaaS, parenting" />
      </div>
      <div class="field">
        <label for="audience">Target Audience</label>
        <input type="text" id="audience" placeholder="e.g. freelancers under $5k/month, first-time founders, new moms" />
      </div>
      <div class="field">
        <label for="painPoint">Pain Point</label>
        <textarea id="painPoint" rows="3" placeholder="e.g. They keep undercharging clients and don't know how to raise rates without losing them"></textarea>
      </div>
    </div>

    <!-- Generate -->
    <button class="btn-generate" id="generateBtn">
      <div class="spinner"></div>
      <span class="btn-label">⚡ Generate Hooks</span>
    </button>

    <div class="error-box" id="errorBox"></div>

    <!-- Results -->
    <div id="results">
      <div class="section-header">
        <div class="section-label">Top Picks</div>
        <button class="btn-copy-all" id="copyTopThreeBtn">Copy top 3</button>
      </div>
      <div id="topPicksContainer"></div>

      <div class="section-header">
        <div class="section-label">All Hooks</div>
      </div>
      <div id="hooksContainer"></div>
    </div>

    <footer>Built with Claude API &nbsp;·&nbsp; Your key never leaves your browser</footer>
  </div>

  <script>
    const STORAGE_KEY  = 'ahg_api_key';
    const PLATFORM_KEY = 'ahg_platform';

    // ── DOM refs ──────────────────────────────
    const apiKeyInput   = document.getElementById('apiKey');
    const apiConnected  = document.getElementById('apiConnected');
    const apiExpanded   = document.getElementById('apiExpanded');
    const apiMasked     = document.getElementById('apiMasked');
    const editKeyBtn    = document.getElementById('editKeyBtn');
    const toggleKeyBtn  = document.getElementById('toggleKey');
    const clearKeyBtn   = document.getElementById('clearKey');
    const nicheInput    = document.getElementById('niche');
    const audienceInput = document.getElementById('audience');
    const painInput     = document.getElementById('painPoint');
    const generateBtn   = document.getElementById('generateBtn');
    const errorBox      = document.getElementById('errorBox');
    const resultsDiv    = document.getElementById('results');
    const topPicksCont  = document.getElementById('topPicksContainer');
    const hooksCont     = document.getElementById('hooksContainer');
    const copyTopThree  = document.getElementById('copyTopThreeBtn');

    // ── Platform config ───────────────────────
    const PLATFORMS = {
      twitter:   { label: 'Twitter / X',    format: '1–2 punchy sentences, conversational, pattern interrupt. No hashtags. Max ~280 chars.' },
      linkedin:  { label: 'LinkedIn',        format: '2–3 sentences, professional but human. Can start with a bold personal observation or data point.' },
      instagram: { label: 'Instagram',       format: '1–2 energetic sentences. Vivid, emotional, immediate. Written for the caption above the fold.' },
      email:     { label: 'Email',           format: 'Subject line format: 5–9 words max. Curiosity-driven. No spam triggers (FREE, !!!). Reads like a human wrote it.' },
      youtube:   { label: 'YouTube',         format: 'Title format: 6–12 words. Uses power words. Creates compelling intrigue or a clear promise. Keyword-conscious.' }
    };

    let selectedPlatform = localStorage.getItem(PLATFORM_KEY) || 'twitter';

    // ── Init: API key state ───────────────────
    function initApiKeyState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        apiKeyInput.value = saved;
        showConnected(saved);
      } else {
        showExpanded();
      }
    }

    function showConnected(key) {
      const masked = key.slice(0, 10) + '···' + key.slice(-4);
      apiMasked.textContent = masked;
      apiConnected.style.display = 'flex';
      apiExpanded.classList.remove('visible');
    }

    function showExpanded() {
      apiConnected.style.display = 'none';
      apiExpanded.classList.add('visible');
    }

    editKeyBtn.addEventListener('click', showExpanded);

    apiKeyInput.addEventListener('change', () => {
      const val = apiKeyInput.value.trim();
      if (val) {
        localStorage.setItem(STORAGE_KEY, val);
        showConnected(val);
      }
    });

    toggleKeyBtn.addEventListener('click', () => {
      apiKeyInput.type = apiKeyInput.type === 'password' ? 'text' : 'password';
    });

    clearKeyBtn.addEventListener('click', () => {
      apiKeyInput.value = '';
      localStorage.removeItem(STORAGE_KEY);
      showExpanded();
    });

    // ── Init: Platform pills ──────────────────
    function initPlatformPills() {
      document.querySelectorAll('.pill').forEach(btn => {
        if (btn.dataset.platform === selectedPlatform) btn.classList.add('active');
        else btn.classList.remove('active');

        btn.addEventListener('click', () => {
          selectedPlatform = btn.dataset.platform;
          localStorage.setItem(PLATFORM_KEY, selectedPlatform);
          document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    }

    // ── Error ─────────────────────────────────
    function showError(msg) { errorBox.textContent = msg; errorBox.style.display = 'block'; }
    function hideError()    { errorBox.style.display = 'none'; }

    // ── Loading ───────────────────────────────
    function setLoading(on) {
      generateBtn.disabled = on;
      generateBtn.classList.toggle('loading', on);
    }

    // ── Prompt ────────────────────────────────
    function buildPrompt(niche, audience, painPoint, platform) {
      const p = PLATFORMS[platform];
      return `You are a world-class direct-response copywriter. Your hooks stop the scroll and compel action.

DIRECT-RESPONSE PRINCIPLES — apply all of these:
1. Specificity beats generality: "I made $4,280 in 11 days" beats "I made money fast"
2. Name the exact emotion: shame, fear, pride, envy, desire — don't hint at it, state it
3. Start mid-scene or mid-thought — drop the reader into the action, not the setup
4. "You" language — make it personal and immediate
5. Subvert the expected — contrarian or unexpected angles outperform obvious ones
6. Every word earns its place — ruthlessly cut anything that delays the punch

PLATFORM: ${p.label}
FORMAT REQUIREMENT: ${p.format}

NICHE: ${niche}
TARGET AUDIENCE: ${audience}
PAIN POINT: ${painPoint}

Generate exactly 10 hooks, each using a DIFFERENT framework:
1. Bold Claim
2. Curiosity Gap
3. Problem-Agitate opener
4. Story/Scene opener
5. Contrarian Take
6. "What If" scenario
7. Specificity (hard number or named detail)
8. Fear/Urgency
9. Transformation promise
10. Direct question

Return a JSON array of exactly 10 objects. Each object:
- "type": framework name
- "hook": the hook text (follow platform format requirement strictly)
- "topPick": true or false — mark exactly 3 as true (your best picks for this specific audience)
- "why": ONLY on topPick items — 1 sentence explaining the psychological mechanism that makes this hook outperform (reference the specific principle: what emotion, what cognitive trigger, what makes it work for THIS audience)

Return ONLY valid JSON. No preamble, no explanation outside the JSON.
Example: [{"type":"Bold Claim","hook":"...","topPick":false},{"type":"Curiosity Gap","hook":"...","topPick":true,"why":"..."}]`;
    }

    // ── Parse ─────────────────────────────────
    function parseHooks(content) {
      const match = content.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('Could not parse hooks from response.');
      return JSON.parse(match[0]);
    }

    // ── Copy helper ───────────────────────────
    function copyText(text, btn, label) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = label || 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    // ── Render ────────────────────────────────
    function renderResults(hooks) {
      topPicksCont.innerHTML = '';
      hooksCont.innerHTML = '';

      const topPicks = hooks.filter(h => h.topPick);

      // Top picks section
      topPicks.forEach((h, i) => {
        topPicksCont.appendChild(buildCard(h, i + 1, true));
      });

      // All hooks section
      hooks.forEach((h, i) => {
        hooksCont.appendChild(buildCard(h, i + 1, false));
      });

      // Copy top 3 button
      copyTopThree.onclick = () => {
        const text = topPicks.map((h, i) => `${i + 1}. ${h.hook}`).join('\n\n');
        copyText(text, copyTopThree, 'Copy top 3');
      };
    }

    function buildCard(h, num, isTopPick) {
      const card = document.createElement('div');
      card.className = 'hook-card' + (isTopPick ? ' top-pick' : '');

      const badge = isTopPick
        ? `<div class="hook-crown">👑</div>`
        : `<div class="hook-number">${num}</div>`;

      const whyHtml = (isTopPick && h.why)
        ? `<div class="hook-why">${h.why}</div>`
        : '';

      const topTag = isTopPick
        ? `<span class="best-pick-tag">Best Pick</span>`
        : '';

      card.innerHTML = `
        <div class="hook-badge">${badge}</div>
        <div class="hook-content">
          <div class="hook-meta">
            <span class="hook-type">${h.type}</span>
            ${topTag}
          </div>
          <div class="hook-text">${h.hook}</div>
          ${whyHtml}
        </div>
        <div class="hook-actions">
          <button class="btn-copy">Copy</button>
        </div>
      `;

      card.querySelector('.btn-copy').addEventListener('click', e => {
        copyText(h.hook, e.currentTarget);
      });

      return card;
    }

    // ── Generate ──────────────────────────────
    generateBtn.addEventListener('click', async () => {
      hideError();

      const apiKey    = apiKeyInput.value.trim() || localStorage.getItem(STORAGE_KEY) || '';
      const niche     = nicheInput.value.trim();
      const audience  = audienceInput.value.trim();
      const painPoint = painInput.value.trim();

      if (!apiKey)    return showError('Please enter your Anthropic API key.');
      if (!niche)     return showError('Please enter your niche.');
      if (!audience)  return showError('Please enter your target audience.');
      if (!painPoint) return showError('Please describe the pain point.');

      localStorage.setItem(STORAGE_KEY, apiKey);

      setLoading(true);
      resultsDiv.style.display = 'none';

      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-haiku-4-5-20251001',
            max_tokens: 2500,
            messages: [{ role: 'user', content: buildPrompt(niche, audience, painPoint, selectedPlatform) }]
          })
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || `API error ${response.status}`);
        }

        const data    = await response.json();
        const content = data.content[0].text;
        const hooks   = parseHooks(content);

        renderResults(hooks);
        resultsDiv.style.display = 'block';

      } catch (err) {
        showError(err.message || 'Something went wrong. Check your API key and try again.');
      } finally {
        setLoading(false);
      }
    });

    // ── Boot ──────────────────────────────────
    initApiKeyState();
    initPlatformPills();
  </script>
</body>
</html>
